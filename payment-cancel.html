<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đã huỷ thanh toán — Phatdatagency</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{ --paper:#F2EEE6; --ink:#211C16; --ink-soft:#5B5347; --coral-deep:#D6391E; --white:#FFFCF6; }
  *{ box-sizing:border-box; }
  body{
    font-family:'Inter',sans-serif; background:var(--paper); color:var(--ink);
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    text-align:center; padding:24px; margin:0;
  }
  .box{ max-width:420px; }
  .icon{ font-size:52px; margin-bottom:8px; }
  h1{ font-family:'Fraunces',serif; font-size:26px; color:var(--coral-deep); margin-bottom:10px; }
  p{ font-size:15px; color:var(--ink-soft); line-height:1.6; }
  a.btn{
    display:inline-block; margin-top:26px; padding:13px 28px;
    background:var(--ink); color:var(--white); border-radius:999px; text-decoration:none; font-weight:600;
  }
</style>
</head>
<body>
  <div class="box">
    <div class="icon">❌</div>
    <h1>Đã huỷ thanh toán</h1>
    <p>Đơn hàng vẫn được lưu. Bạn có thể thanh toán lại bất cứ lúc nào.</p>
    <a href="/" class="btn">← Quay về trang chủ</a>
  </div>
</body>
</html>
